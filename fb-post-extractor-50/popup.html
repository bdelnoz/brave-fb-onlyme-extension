<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>FB Post Extractor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 340px;
      margin: 12px;
    }

    h1 {
      font-size: 16px;
      margin: 0 0 12px;
    }

    label {
      display: block;
      margin: 8px 0 4px;
      font-size: 13px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      white-space: pre-wrap;
      font-size: 12px;
      border: 1px solid #ccc;
      padding: 8px;
      min-height: 110px;
      background: #f7f7f7;
    }

    .hint {
      margin-top: 8px;
      font-size: 11px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Extract up to 50 posts</h1>

  <label for="maxPosts">Max posts (cap: 50)</label>
  <input id="maxPosts" type="number" value="50" min="1" max="50">

  <label for="scrollDelayMs">Scroll delay (ms)</label>
  <input id="scrollDelayMs" type="number" value="1600" min="300" max="10000">

  <label for="maxScrolls">Max scroll attempts</label>
  <input id="maxScrolls" type="number" value="180" min="5" max="1000">

  <button id="startBtn">Start extraction</button>
  <button id="statusBtn">Refresh status</button>
  <button id="copyBtn">Copy JSON to clipboard</button>
  <button id="downloadBtn">Download JSON file</button>

  <div id="status">Ready.</div>

  <div class="hint">Open a Facebook feed/profile in the active tab before running.</div>

  <script src="popup.js"></script>
</body>
</html>
